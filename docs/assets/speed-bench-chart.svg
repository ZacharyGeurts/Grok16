<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 320" role="img" aria-label="Speed demo compile vs execution">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f18"/>
      <stop offset="100%" stop-color="#060a12"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c878"/>
      <stop offset="100%" stop-color="#c8a030"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ec8ff"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="920" height="320" fill="url(#bg)" rx="12"/>
  <text x="24" y="36" fill="#e8c878" font-family="system-ui,sans-serif" font-size="18" font-weight="700">speed_demo 1.1.0 — compile (ms) vs execution (M ops/s)</text>
  <text x="24" y="58" fill="#8fb4d9" font-family="system-ui,sans-serif" font-size="12">Grok16 4.7.1 · report v4.7.1 · gcc-14 host · pythong 16.1.0-gpy16</text>
  <text x="24" y="92" fill="#a8a49c" font-size="11">COMPILE</text>
  <rect x="140" y="78" width="720" height="18" fill="url(#gold)" rx="4"/><text x="148" y="92" fill="#060a12" font-size="11" font-weight="400">bench-all expert · 2,275ms</text>

  <rect x="140" y="104" width="657" height="18" fill="#c8a030" rx="4"/><text x="148" y="118" fill="#060a12" font-size="11" font-weight="400">host g++ triad · 2,078ms</text>

  <rect x="140" y="130" width="579" height="18" fill="#c8a030" rx="4"/><text x="148" y="144" fill="#060a12" font-size="11" font-weight="400">bench-all belt_2_0 · 1,831ms</text>

  <rect x="140" y="156" width="561" height="18" fill="#c8a030" rx="4"/><text x="148" y="170" fill="#060a12" font-size="11" font-weight="400">g16 belt_1_0 triad · 1,774ms</text>

  <rect x="140" y="182" width="483" height="18" fill="#c8a030" rx="4"/><text x="148" y="196" fill="#060a12" font-size="11" font-weight="400">g16 belt_2_0 triad · 1,527ms</text>

  <rect x="140" y="208" width="438" height="18" fill="#c8a030" rx="4"/><text x="148" y="222" fill="#060a12" font-size="11" font-weight="400">bench-all belt_1_0 · 1,386ms</text>

  <line x1="120" y1="210" x2="880" y2="210" stroke="#2a3140" stroke-width="1"/>
  <text x="24" y="232" fill="#a8a49c" font-size="11">EXECUTION</text>
  <rect x="140" y="218" width="720" height="22" fill="url(#cyan)" rx="4"/><text x="148" y="236" fill="#060a12" font-size="11" font-weight="600">C++ — g16 belt_1_0 · 85M ops/s WINNER</text>

  <rect x="140" y="248" width="697" height="18" fill="#38bdf8" rx="4"/><text x="148" y="262" fill="#060a12" font-size="11" font-weight="400">CMake — host g++ -O2 · 82M ops/s</text>

  <rect x="140" y="274" width="664" height="18" fill="#38bdf8" rx="4"/><text x="148" y="288" fill="#060a12" font-size="11" font-weight="400">C++ — g16 sense hostess_secure · 78M ops/s</text>

  <rect x="140" y="300" width="662" height="18" fill="#38bdf8" rx="4"/><text x="148" y="314" fill="#060a12" font-size="11" font-weight="400">C++ — host g++ -O2 · 78M ops/s</text>

  <rect x="140" y="326" width="626" height="18" fill="#38bdf8" rx="4"/><text x="148" y="340" fill="#060a12" font-size="11" font-weight="400">C++ — g16 belt_2_0 · 74M ops/s</text>

  <rect x="140" y="352" width="584" height="18" fill="#38bdf8" rx="4"/><text x="148" y="366" fill="#060a12" font-size="11" font-weight="400">C++ — g16 belt_2_0 (post-meld re-exec) · 69M ops/s</text>

</svg>
