name: Grok16 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  batteries:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake python3 python3-pip file

      - name: Shell syntax
        run: bash -n scripts/grok16-toolchain.sh && bash -n scripts/grok16-config.sh

      - name: Python compile
        run: python3 -m py_compile forge/*.py scripts/grok16-profile-flags.py

      - name: Paths + profile JSON
        run: |
          export G16_PREFIX="$PWD"
          ./scripts/grok16-toolchain.sh paths
          python3 -c "import json; json.load(open('data/grok16-profiles.json'))"

      - name: Bootstrap compiler (when missing)
        run: |
          export G16_PREFIX="$PWD"
          export GROK16_ROOT="$PWD"
          if ! ./scripts/grok16-toolchain.sh status >/dev/null 2>&1; then
            echo "Compiler not prebuilt — bootstrap required on CI runner"
            echo "Set G16_CI_SKIP_BOOTSTRAP=0 and provide vendor/gcc cache to enable full gate"
            exit 0
          fi
          ./scripts/grok16-toolchain.sh status

      - name: Expert battery
        if: env.G16_CI_SKIP_BOOTSTRAP != '1'
        run: |
          export G16_PREFIX="$PWD"
          export GROK16_ROOT="$PWD"
          ./scripts/grok16-toolchain.sh test-battery-expert

      - name: Heavy battery (1.0 gate)
        if: env.G16_CI_SKIP_BOOTSTRAP != '1'
        run: |
          export G16_PREFIX="$PWD"
          export GROK16_ROOT="$PWD"
          export G16_RELEASE_PROFILE=1
          ./scripts/grok16-toolchain.sh test-battery-heavy

      - name: Release battery
        if: env.G16_CI_SKIP_BOOTSTRAP != '1'
        run: |
          export G16_PREFIX="$PWD"
          export GROK16_ROOT="$PWD"
          export G16_RELEASE_PROFILE=1
          ./scripts/grok16-toolchain.sh test-battery-release